# ── SolKBD Portfolio — Nginx virtual host ──
# Cloudflare Tunnel terminates TLS at the edge; nginx speaks plain HTTP only.
# Real client IP arrives via the CF-Connecting-IP header.

# ── Rate limit zone — keyed on real client IP supplied by Cloudflare ──
limit_req_zone $http_cf_connecting_ip zone=contact_zone:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name _;   # cloudflared forwards all hostnames — accept any

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Security headers ──
    # HSTS is still valid: Cloudflare serves HTTPS to the user.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data: https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; frame-ancestors 'self'" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/ttf font/otf font/woff font/woff2;
    gzip_min_length 512;

    # ── Static assets: long cache ──
    location ~* \.(?:css|js|woff2?|ttf|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ── Contact endpoint with rate limit ──
    location = /api/contact {
        limit_req zone=contact_zone burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Other API endpoints ──
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── SEO files ──
    location = /robots.txt  { try_files $uri =404; }
    location = /sitemap.xml { try_files $uri =404; }
}
